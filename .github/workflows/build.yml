name: Build Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: import_utility-windows.exe
            binary_path: target/release/import_utility.exe
          - os: ubuntu-latest
            artifact_name: import_utility-linux
            binary_path: target/release/import_utility
          - os: macos-latest
            artifact_name: import_utility-macos
            binary_path: target/release/import_utility

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run Tests
      run: cargo test

    - name: Build Release
      run: cargo build --release

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.binary_path }}
